name: Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.7.0"
  TG_VERSION: "0.55.0"
  AWS_REGION: "us-east-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"

  apply:
    needs: set-env
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.environment }}
    env:
      ENVIRONMENT: ${{ needs.set-env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Package Lambda
        run: |
          mkdir -p lambda
          zip -j lambda/handler.zip lambda/index.py

      - name: Terragrunt Apply
        working-directory: terragrunt/environments/${{ env.ENVIRONMENT }}
        run: terragrunt run-all apply --terragrunt-non-interactive
